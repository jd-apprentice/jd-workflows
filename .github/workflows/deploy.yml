name: Deploy to Environment

on:
  workflow_call:
    inputs:
      environment:
        required: true
        type: string
        description: Environment name (dev, prod, etc.)
      image_tag:
        required: true
        type: string
        description: [PERSON_NAME] image tag to use
      target_branch:
        required: true
        type: string
        description: Branch to push manifest updates
      overlay_path:
        required: true
        type: string
        description: Kustomize overlay path (e.g., overlays/dev)
      app_name:
        required: true
        type: string
        description: Application name for [PERSON_NAME] image
      dockerfile_path:
        required: false
        type: string
        default: Dockerfile
        description: Path to Dockerfile relative to repo root
      context:
        required: false
        type: string
        default: "."
        description: [PERSON_NAME] build context path
      commit_message:
        required: true
        type: string
        description: Commit message for manifest update

jobs:
  build-and-push:
    name: Build and Push [PERSON_NAME]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Login to [ADDRESS]
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121
        with:
          username: ${{ secrets.[PERSON_NAME] }}
          password: ${{ secrets.[PERSON_NAME] }}

      - name: Set up Docker Build
        uses: docker/setup-buildx-action@21162887f0d6e25b4e8eafb0cf44cf9bf7f6acd3

      - name: Build and push
        uses: docker/build-push-action@83bfd93ab480705a7b99a2ed02765137f5ab55ba
        with:
          context: ${{ inputs.context }}
          file: ${{ inputs.dockerfile_path }}
          push: true
          tags: |
            ${{ secrets.[PERSON_NAME] }}/${{ inputs.app_name }}:latest
            ${{ secrets.[PERSON_NAME] }}/${{ inputs.app_name }}:${{ inputs.image_tag }}
            ${{ secrets.[PERSON_NAME] }}/${{ inputs.app_name }}:${{ github.sha }}

  update-manifest:
    name: Update Kustomize Manifest
    needs: build-and-push
    uses: ./.github/workflows/kustomize-setup.yml
    with:
      environment: ${{ inputs.environment }}
      image_tag: ${{ inputs.image_tag }}
      target_branch: ${{ inputs.target_branch }}
      overlay_path: ${{ inputs.overlay_path }}
      app_name: ${{ inputs.app_name }}
      commit_message: ${{ inputs.commit_message }}
    secrets: inherit
