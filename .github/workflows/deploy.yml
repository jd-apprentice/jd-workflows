name: Deploy to Environment

on:
  workflow_call:
    inputs:
      environment:
        required: true
        type: string
        description: Environment name (dev, prod, etc.)
      image_tag:
        required: true
        type: string
        description: Docker image tag to use
      target_branch:
        required: true
        type: string
        description: Branch to push manifest updates
      overlay_path:
        required: true
        type: string
        description: Kustomize overlay path (e.g., overlays/dev)
      app_name:
        required: true
        type: string
        description: Application name for Docker image
      dockerfile_path:
        required: false
        type: string
        default: Dockerfile
        description: Path to Dockerfile relative to repo root
      context:
        required: false
        type: string
        default: "."
        description: Docker build context path
      commit_message:
        required: true
        type: string
        description: Commit message for manifest update

jobs:
  deploy:
    name: Deploy to ${{ inputs.environment }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Set up Docker Build
        uses: docker/setup-buildx-action@21162887f0d6e25b4e8eafb0cf44cf9bf7f6acd3

      - name: Build and push
        uses: docker/build-push-action@83bfd93ab480705a7b99a2ed02765137f5ab55ba
        with:
          context: ${{ inputs.context }}
          file: ${{ inputs.dockerfile_path }}
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/${{ inputs.app_name }}:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/${{ inputs.app_name }}:${{ inputs.image_tag }}
            ${{ secrets.DOCKERHUB_USERNAME }}/${{ inputs.app_name }}:${{ github.sha }}

      - name: Checkout target branch
        uses: actions/checkout@0c366fd6a839edf440554fa01a7085ccba70ac98
        with:
          ref: ${{ inputs.target_branch }}

      - name: Setup Kustomize
        uses: jd-apprentice/jd-workflows/.github/workflows/kustomize-setup.yml@main

      - name: Update Kubernetes manifest
        run: |
          cd infra/kubernetes/${{ inputs.overlay_path }}
          kustomize edit set image dyallo/${{ inputs.app_name }}=${{ secrets.DOCKERHUB_USERNAME }}/${{ inputs.app_name }}:${{ inputs.image_tag }}

      - name: Commit and push manifest update
        run: |
          git config user.name "GitHub Action"
          git config user.email "action@github.com"
          git remote set-url origin https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}
          git add infra/kubernetes/${{ inputs.overlay_path }}/kustomization.yaml
          git commit -m "${{ inputs.commit_message }}"
          git push origin HEAD:refs/heads/${{ inputs.target_branch }}
