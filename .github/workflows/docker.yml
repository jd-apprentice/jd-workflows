name: Docker build and push

on:
  workflow_call:
    inputs:
      runs-on:
        default: ubuntu-latest
        required: false
        type: string
      name:
        default: docker build and push
        required: false
        type: string
      context:
        default: ""
        required: true
        type: string
      file:
        default: ""
        required: true
        type: string
      image_name:
        default: ""
        required: true
        type: string
      push:
        default: true
        required: false
        type: boolean
    secrets:
      docker_user:
        required: false
        description: Docker Hub username (defaults to DOCKERHUB_USERNAME if not provided)
      docker_token:
        required: false
        description: Docker Hub password/token
      dockerhub_username:
        required: false
        description: Docker Hub username for tagging (uses DOCKERHUB_USERNAME env if not provided)
      dockerhub_token:
        required: false
        description: Docker Hub token for tagging (uses DOCKERHUB_TOKEN env if not provided)

permissions:
  contents: read

jobs:
  build_and_push:
    name: ${{ inputs.name }}
    runs-on: ${{ inputs.runs-on }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121
        with:
          username: ${{ secrets.docker_user || secrets.dockerhub_username }}
          password: ${{ secrets.docker_token || secrets.dockerhub_token }}

      - name: Set up Docker Build
        uses: docker/setup-buildx-action@21162887f0d6e25b4e8eafb0cf44cf9bf7f6acd3

      - name: Build and push
        uses: docker/build-push-action@83bfd93ab480705a7b99a2ed02765137f5ab55ba
        with:
          context: ${{ inputs.context }}
          file: ${{ inputs.file }}
          push: ${{ inputs.push }}
          tags: |
            ${{ secrets.dockerhub_username || secrets.DOCKERHUB_USERNAME }}/${{ inputs.image_name}}:latest
            ${{ secrets.dockerhub_username || secrets.DOCKERHUB_USERNAME }}/${{ inputs.image_name}}:${{ github.ref_name }}
            ${{ secrets.dockerhub_username || secrets.DOCKERHUB_USERNAME }}/${{ inputs.image_name}}:${{ github.sha }}
