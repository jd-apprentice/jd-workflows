name: Docker Publish

on:
  workflow_dispatch:
    inputs:
      environment:
        description: "Environment to deploy (dev, prod)"
        required: true
        type: choice
        options:
          - dev
          - prod
      app_name:
        description: "Application name for Docker image"
        required: true
        type: string
      dockerfile_path:
        description: "Path to Dockerfile relative to repo root"
        required: false
        type: string
        default: Dockerfile
  pull_request:
    branches: ["develop"]
    paths:
      - "src/**"
      - "tests/**"
  push:
    branches: ["master"]
    tags:
      - "v*"
  release:
    types: [published]

jobs:
  develop:
    if: ${{ github.ref_name != 'master' && !startsWith(github.ref_name, 'v') }}
    uses: ./.github/workflows/deploy.yml
    with:
      environment: dev
      image_tag: dev-${{ github.sha }}
      target_branch: develop
      overlay_path: overlays/dev
      app_name: ${{ inputs.app_name }}
      dockerfile_path: ${{ inputs.dockerfile_path }}
      commit_message: "chore: update dev image to dev-${{ github.sha }}"
    secrets: inherit

  production:
    if: (github.ref_name == 'master' || startsWith(github.ref_name, 'v')) && github.event_name != 'pull_request'
    uses: ./.github/workflows/deploy.yml
    with:
      environment: prod
      image_tag: ${{ github.ref_name }}
      target_branch: master
      overlay_path: overlays/prod
      app_name: ${{ inputs.app_name }}
      dockerfile_path: ${{ inputs.dockerfile_path }}
      commit_message: "chore: update image tag to ${{ github.ref_name }}"
    secrets: inherit
